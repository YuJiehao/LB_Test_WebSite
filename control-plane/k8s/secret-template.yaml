# k8s/secret-template.yaml
#
# Template for the htpasswd-based Basic Auth Secret consumed by the nginx
# Ingress controller.
#
# The `auth` data field must contain a valid htpasswd entry (bcrypt-encoded).
# Generate it with:
#
#   htpasswd -nbB admin '<password>' \
#     | kubectl create secret generic lb-control-plane-auth \
#       --from-file=auth=/dev/stdin \
#       --dry-run=client -o yaml
#
# Or use the Makefile target (from the control-plane directory):
#
#   make auth-secret AUTH_PASSWORD=<password>
#
# IMPORTANT:
#   - Use bcrypt (-B). The nginx Ingress controller's auth annotation
#     does NOT support DES (-d) or MD5 (-m) htpasswd entries.
#   - Replace `namespace` to match the target deployment namespace.
#   - This Secret is created ONCE at deploy time, then referenced by the
#     Ingress annotation `nginx.ingress.kubernetes.io/auth-secret`.
#
# WARNING: Do NOT commit the real Secret to git. Apply it directly to the
# cluster via kubectl.
---
apiVersion: v1
kind: Secret
metadata:
  name: lb-control-plane-auth
  namespace: default
type: Opaque
data:
  # Placeholder — replace with base64-encoded htpasswd content.
  # Example value (generated with htpasswd -nbB admin changeme):
  # YWRtaW46JDJ5JDA1JHRm...
  auth: ""
