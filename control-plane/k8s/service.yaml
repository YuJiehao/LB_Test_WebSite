apiVersion: v1
kind: Service
metadata:
  name: control-plane-service
  labels:
    app: control-plane
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30081
    protocol: TCP
    name: http
  selector:
    app: control-plane
