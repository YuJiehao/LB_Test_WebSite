apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-balancer-test-deployment
  labels:
    app: load-balancer-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: load-balancer-test
  template:
    metadata:
      labels:
        app: load-balancer-test
    spec:
      serviceAccountName: load-balancer-test-app
      imagePullSecrets:
        - name: harbor-regcred
      containers:
      - name: app
        image: 172.20.20.250/webapps/load-balancer-test:v1.9.1
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: PORT
          value: "3000"
        - name: SESSION_SECRET
          value: "k8s-load-balancer-test-secret"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      securityContext:
        fsGroup: 1001
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: load-balancer-test-config
data:
  app-config.json: |
    {
      "sessionTimeout": 1800000,
      "logLevel": "info",
      "trustedProxies": "true"
    }
